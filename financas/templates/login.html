<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FinançasPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--em:#00C896;--em2:#00A87E;--navy:#0D1B2A;--surface:#162130;--border:rgba(255,255,255,.07);--muted:#8BA0B0;--danger:#FF5C5C}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,200,150,.12) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 32px 64px rgba(0,0,0,.4);animation:up .5s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:'DM Serif Display',serif;font-size:2rem;color:#fff;margin-bottom:4px}.logo span{color:var(--em)}
.subtitle{color:var(--muted);font-size:.875rem;margin-bottom:36px}
label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.field{margin-bottom:20px}
input{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s;outline:none}
input:focus{border-color:var(--em)}
.btn{width:100%;background:var(--em);color:var(--navy);border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s,transform .1s}
.btn:hover{background:var(--em2);transform:translateY(-1px)}
.alert{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.3);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:.875rem;margin-bottom:20px}
.hint{color:var(--muted);font-size:.78rem;margin-top:20px;text-align:center}
.hint code{color:var(--em);background:rgba(0,200,150,.1);padding:2px 6px;border-radius:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Finan<span>ças</span>Pro</div>
  <p class="subtitle">Controle financeiro pessoal</p>
  {% for cat,msg in get_flashed_messages(with_categories=true) %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}
  <form method="POST">
    <div class="field"><label>Login</label><input type="text" name="login" required autofocus></div>
    <div class="field"><label>Senha</label><input type="password" name="senha" required></div>
    <button class="btn" type="submit">Entrar</button>
  </form>
  <p class="hint">Acesso padrão: <code>admin</code> / <code>admin123</code></p>
</div>
</body>
</html>
