<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FinançasPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --emerald: #00C896;
    --emerald-dark: #00A87E;
    --navy: #0D1B2A;
    --slate: #1C2E40;
    --muted: #8BA0B0;
    --surface: #162130;
    --border: rgba(255,255,255,0.07);
    --danger: #FF5C5C;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,200,150,0.12) 0%, transparent 70%);
    top: -150px; right: -150px;
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,200,150,0.07) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    border-radius: 50%;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #fff;
    margin-bottom: 4px;
  }
  .logo span { color: var(--emerald); }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 36px; }
  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field { margin-bottom: 20px; }
  input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--emerald); }
  .btn {
    width: 100%;
    background: var(--emerald);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: var(--emerald-dark); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .alert {
    background: rgba(255,92,92,0.12);
    border: 1px solid rgba(255,92,92,0.3);
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.875rem;
    margin-bottom: 20px;
  }
  .hint { color: var(--muted); font-size: 0.78rem; margin-top: 20px; text-align: center; }
  .hint code { color: var(--emerald); background: rgba(0,200,150,0.1); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Finan<span>ças</span>Pro</div>
  <p class="subtitle">Controle financeiro pessoal</p>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}

  <form method="POST">
    <div class="field">
      <label>Login</label>
      <input type="text" name="login" placeholder="Digite seu login" required autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Entrar</button>
  </form>
  <p class="hint">Acesso padrão: <code>admin</code> / <code>admin123</code></p>
</div>
</body>
</html>
