<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ acao }} Lançamento — FinançasPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--em:#00C896;--em2:#00A87E;--navy:#0D1B2A;--surface:#162130;--border:rgba(255,255,255,.07);--muted:#8BA0B0;--danger:#FF5C5C}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:#fff;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff}.logo span{color:var(--em)}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-back:hover{border-color:var(--muted);color:#fff}
main{max-width:560px;margin:0 auto;padding:40px 24px}
.page-title{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:.875rem;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}
.field{margin-bottom:20px}
label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase}
input,select{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s;outline:none;appearance:none}
input:focus,select:focus{border-color:var(--em)}
select option{background:var(--navy)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn-submit{width:100%;background:var(--em);color:var(--navy);border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s,transform .1s}
.btn-submit:hover{background:var(--em2);transform:translateY(-1px)}
.btn-cancel{display:block;text-align:center;color:var(--muted);text-decoration:none;margin-top:14px;font-size:.875rem;transition:color .2s}
.btn-cancel:hover{color:#fff}
</style>
</head>
<body>
<nav>
  <div class="logo">Finan<span>ças</span>Pro</div>
  <a href="/lancamentos" class="btn-back">← Voltar</a>
</nav>

<main>
  <div class="page-title">{{ acao }} Lançamento</div>
  <p class="page-sub">{% if acao == 'Novo' %}Preencha os dados do novo lançamento{% else %}Altere os dados do lançamento{% endif %}</p>

  <div class="card">
    <form method="POST">
      <div class="field">
        <label>Descrição</label>
        <input type="text" name="descricao" required maxlength="200"
               value="{{ lancamento.descricao if lancamento else '' }}" placeholder="Ex: Salário, Aluguel...">
      </div>
      <div class="row2">
        <div class="field">
          <label>Data</label>
          <input type="date" name="data_lancamento" required
                 value="{{ lancamento.data_lancamento if lancamento else '' }}">
        </div>
        <div class="field">
          <label>Valor (R$)</label>
          <input type="number" name="valor" step="0.01" min="0.01" required
                 value="{{ lancamento.valor if lancamento else '' }}" placeholder="0,00">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Tipo</label>
          <select name="tipo_lancamento" required>
            <option value="R" {% if lancamento and lancamento.tipo_lancamento=='R' %}selected{% endif %}>Receita</option>
            <option value="D" {% if lancamento and lancamento.tipo_lancamento=='D' %}selected{% endif %}>Despesa</option>
          </select>
        </div>
        <div class="field">
          <label>Situação</label>
          <select name="situacao" required>
            <option value="P" {% if lancamento and lancamento.situacao=='P' %}selected{% endif %}>Pendente</option>
            <option value="E" {% if lancamento and lancamento.situacao=='E' %}selected{% endif %}>Efetivado</option>
            <option value="C" {% if lancamento and lancamento.situacao=='C' %}selected{% endif %}>Cancelado</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-submit">
        {% if acao == 'Novo' %}Criar Lançamento{% else %}Salvar Alterações{% endif %}
      </button>
    </form>
    <a href="/lancamentos" class="btn-cancel">Cancelar</a>
  </div>
</main>
</body>
</html>
