version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financas_postgres_homolog
    restart: unless-stopped
    environment:
      POSTGRES_DB:       financas_homolog
      POSTGRES_USER:     financas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-financas123}
    volumes:
      - postgres_homolog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_homolog"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${DOCKER_IMAGE:-financaspro}:${IMAGE_TAG:-latest}
    container_name: financas_app_homolog
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      APP_ENV:      homolog
      PORT:         5000
      SECRET_KEY:   ${SECRET_KEY:-homolog_secret}
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      financas_homolog
      DB_USER:      financas
      DB_PASSWORD:  ${DB_PASSWORD:-financas123}
      MAIL_HOST:    ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT:    ${MAIL_PORT:-587}
      MAIL_USER:    ${MAIL_USER:-}
      MAIL_PASSWORD:${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_homolog_data:
