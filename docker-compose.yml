services:
  postgres_prod:
    image: postgres:16-alpine
    container_name: financas_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: financas_prod
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas123
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - financas_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_prod"]
      interval: 5s
      timeout: 5s
      retries: 10
  app_prod:
    image: financaspro:latest
    container_name: financas_app_prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      APP_ENV: prod
      PORT: 5000
      SECRET_KEY: prod_secret
      DB_HOST: postgres_prod
      DB_PORT: 5432
      DB_NAME: financas_prod
      DB_USER: financas
      DB_PASSWORD: financas123
    networks:
      - financas_prod_net
    depends_on:
      postgres_prod:
        condition: service_healthy
  postgres_homolog:
    image: postgres:16-alpine
    container_name: financas_postgres_homolog
    restart: unless-stopped
    environment:
      POSTGRES_DB: financas_homolog
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas123
    volumes:
      - postgres_homolog_data:/var/lib/postgresql/data
    networks:
      - financas_homolog_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_homolog"]
      interval: 5s
      timeout: 5s
      retries: 10
  app_homolog:
    image: financaspro:latest
    container_name: financas_app_homolog
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      APP_ENV: homolog
      PORT: 5000
      SECRET_KEY: homolog_secret
      DB_HOST: postgres_homolog
      DB_PORT: 5432
      DB_NAME: financas_homolog
      DB_USER: financas
      DB_PASSWORD: financas123
    networks:
      - financas_homolog_net
    depends_on:
      postgres_homolog:
        condition: service_healthy
networks:
  financas_prod_net:
    name: financas_prod_net
  financas_homolog_net:
    name: financas_homolog_net
volumes:
  postgres_prod_data:
  postgres_homolog_data:
